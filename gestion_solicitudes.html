<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GELCO - Gestión de Solicitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 pb-20 font-sans text-left">
    <header class="bg-[#004A99] text-white p-5 shadow-md sticky top-0 z-50 flex items-center justify-between">
        <div class="flex items-center">
            <a href="index.html" class="mr-4 hover:text-blue-200"><i class="fas fa-arrow-left text-xl"></i></a>
            <h1 class="font-bold uppercase text-sm tracking-widest">Gestión de Solicitudes</h1>
        </div>
        <div class="text-[10px] font-bold bg-white/20 px-3 py-1 rounded-full uppercase">Vista General</div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="p-4 text-[10px] font-black text-gray-400 uppercase">Apertura</th>
                            <th class="p-4 text-[10px] font-black text-gray-400 uppercase">Título / Caso</th>
                            <th class="p-4 text-[10px] font-black text-gray-400 uppercase">Cliente</th>
                            <th class="p-4 text-[10px] font-black text-gray-400 uppercase">Planta</th>
                            <th class="p-4 text-[10px] font-black text-gray-400 uppercase">Límite / Resolución</th>
                            <th class="p-4 text-[10px] font-black text-gray-400 uppercase text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr class="hover:bg-blue-50 transition-colors cursor-pointer" onclick="location.href='coordinacion_tecnica.html'">
                            <td class="p-4 text-xs text-gray-500">20/Abr/26</td>
                            <td class="p-4 font-bold text-blue-900 text-xs uppercase">M-AT-001 | Optimización Viscosidad</td>
                            <td class="p-4 text-xs font-medium">Nestlé</td>
                            <td class="p-4 text-[10px] font-bold text-gray-400 uppercase">Manizales</td>
                            <td class="p-4 text-xs font-bold text-red-500">25/Abr/26</td>
                            <td class="p-4 text-center">
                                <span class="bg-blue-100 text-blue-700 text-[9px] px-2 py-1 rounded-full font-black uppercase">Coordinación</span>
                            </td>
                        </tr>
                        <tr class="hover:bg-blue-50 transition-colors cursor-pointer" onclick="location.href='cierre_envio.html'">
                            <td class="p-4 text-xs text-gray-500">10/Abr/26</td>
                            <td class="p-4 font-bold text-blue-900 text-xs uppercase">P-RE-042 | Reclamo Bloom Bajo</td>
                            <td class="p-4 text-xs font-medium">Pfizer</td>
                            <td class="p-4 text-[10px] font-bold text-gray-400 uppercase">Pedreira</td>
                            <td class="p-4 text-xs font-bold text-emerald-600">Resuelto</td>
                            <td class="p-4 text-center">
                                <span class="bg-emerald-100 text-emerald-700 text-[9px] px-2 py-1 rounded-full font-black uppercase">Cerrado</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
