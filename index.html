<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GELCO - Portal Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gelco-blue { background-color: #004A99; }
        .card-btn { transition: all 0.2s ease; cursor: pointer; }
        .card-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="gelco-blue text-white p-6 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center text-left">
            <div class="text-left">
                <h1 class="text-xl font-bold tracking-widest text-white">GELCO GROUP</h1>
                <p class="text-blue-200 text-[10px] uppercase">Portal de Gestión de Asistencia</p>
            </div>
            <div class="text-right border-l border-white/20 pl-4">
                <p class="text-[10px] font-bold text-blue-100 uppercase">Bienvenido</p>
                <p class="text-xs font-black">Dr. Químico Industrial</p>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
        
        <a href="nueva_solicitud.html" class="card-btn bg-white border border-blue-100 p-6 rounded-2xl flex items-center text-left">
            <div class="bg-blue-600 text-white p-4 rounded-xl mr-5">
                <i class="fas fa-plus-circle text-2xl"></i>
            </div>
            <div>
                <h3 class="font-bold text-gray-800">Nueva Solicitud</h3>
                <p class="text-xs text-gray-400">Crear caso de asistencia técnica</p>
            </div>
        </a>

        <a href="gestion_solicitudes.html" class="card-btn bg-white border border-blue-100 p-6 rounded-2xl flex items-center text-left">
            <div class="bg-cyan-500 text-white p-4 rounded-xl mr-5">
                <i class="fas fa-folder-open text-2xl"></i>
            </div>
            <div>
                <h3 class="font-bold text-gray-800">Gestión de Solicitudes</h3>
                <p class="text-xs text-gray-400">Trazabilidad de casos activos</p>
            </div>
        </a>

        <a href="aprobaciones_pendientes.html" class="card-btn bg-white border border-blue-100 p-6 rounded-2xl flex items-center text-left">
            <div class="bg-amber-500 text-white p-4 rounded-xl mr-5">
                <i class="fas fa-signature text-2xl"></i>
            </div>
            <div>
                <h3 class="font-bold text-gray-800">Aprobaciones</h3>
                <p class="text-xs text-gray-400">Firmas y validaciones pendientes</p>
            </div>
        </a>

        <a href="tareas_tecnicas.html" class="card-btn bg-white border border-blue-100 p-6 rounded-2xl flex items-center text-left text-left">
            <div class="bg-emerald-500 text-white p-4 rounded-xl mr-5">
                <i class="fas fa-flask text-2xl"></i>
            </div>
            <div>
                <h3 class="font-bold text-gray-800">Tareas Técnicas</h3>
                <p class="text-xs text-gray-400">Ensayos y reportes asignados</p>
            </div>
        </a>

    </main>
</body>
</html>
