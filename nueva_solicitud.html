<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GELCO - Registro de Solicitud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-20 text-left">
    <header class="bg-[#004A99] text-white p-4 shadow-md flex items-center sticky top-0 z-50">
        <a href="index.html" class="mr-4 hover:text-blue-200"><i class="fas fa-arrow-left text-xl"></i></a>
        <h1 class="font-bold uppercase text-sm tracking-widest text-left">Fase 1: Recepción de Solicitud</h1>
    </header>

    <main class="max-w-3xl mx-auto p-4 md:p-8 space-y-8">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
            <h2 class="text-blue-800 font-black text-xs uppercase border-b pb-2 text-left">Contexto General</h2>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1 text-left">Cliente / Empresa</label>
                <input type="text" placeholder="Ej: Nestlé S.A." class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl text-sm outline-none focus:ring-2 ring-blue-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1 text-left">Planta de Origen</label>
                    <select class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl text-sm outline-none">
                        <option>Manizales</option>
                        <option>Ambato</option>
                        <option>Pedreira</option>
                        <option>Franca</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1 text-left">Tipo de Asistencia</label>
                    <select class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl text-sm outline-none">
                        <option>Reclamo de Calidad</option>
                        <option>Desarrollo de Producto</option>
                        <option>Optimización de Proceso</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
            <h2 class="text-blue-800 font-black text-xs uppercase border-b pb-2 text-left">Detalle de la Solicitud</h2>
            <textarea class="w-full bg-gray-50 border border-gray-100 p-4 rounded-xl text-sm h-32 outline-none focus:bg-white" placeholder="Descripción detallada de la solicitud..."></textarea>
            <div class="border-2 border-dashed border-gray-200 p-6 text-center rounded-xl hover:bg-gray-50 cursor-pointer">
                <i class="fas fa-paperclip text-gray-400 mb-2"></i>
                <p class="text-[10px] text-gray-400 font-bold uppercase">Adjuntar archivos (PDF, Imágenes, Excel)</p>
            </div>
        </div>

        <div class="pt-4 flex justify-center">
            <a href="historial_interacciones.html" class="flex items-center gap-2 text-cyan-700 bg-cyan-50 border border-cyan-200 px-6 py-3 rounded-xl hover:bg-cyan-100 transition-all text-xs font-black uppercase tracking-widest shadow-sm">
                <i class="fas fa-history text-lg"></i> Consultar Historial de Interacciones del Caso
            </a>
        </div>

        <div class="flex gap-4 pt-4">
            <button class="flex-1 bg-gray-200 text-gray-600 py-4 rounded-2xl font-bold text-xs uppercase hover:bg-gray-300">Guardar Incompleta</button>
            <a href="coordinacion_tecnica.html" class="flex-1 bg-[#004A99] text-white py-4 rounded-2xl font-bold text-xs uppercase text-center flex items-center justify-center hover:bg-blue-800 transition-all shadow-lg">
                Siguiente: Coordinación <i class="fas fa-arrow-right ml-2"></i>
            </a>
        </div>

    </main>
</body>
</html>
