<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GELCO - Tareas Técnicas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 pb-20 font-sans text-left">
    <header class="bg-[#059669] text-white p-5 shadow-md sticky top-0 z-50 flex items-center justify-between">
        <div class="flex items-center">
            <a href="index.html" class="mr-4 hover:text-emerald-200"><i class="fas fa-arrow-left text-xl"></i></a>
            <h1 class="font-bold uppercase text-sm tracking-widest text-left text-white">Mis Tareas Técnicas</h1>
        </div>
        <div class="bg-white/20 px-3 py-1 rounded-full text-[9px] font-black uppercase">Laboratorio I+D / Calidad</div>
    </header>

    <main class="max-w-3xl mx-auto p-4 md:p-8 space-y-4">
        <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-emerald-500 flex justify-between items-center group hover:shadow-md transition-all">
            <div class="text-left">
                <div class="flex items-center gap-2 mb-1">
                    <span class="text-[9px] font-black text-emerald-600 uppercase bg-emerald-50 px-2 py-0.5 rounded text-left">Pendiente</span>
                    <span class="text-[9px] font-bold text-red-500 uppercase italic text-left">Vence en 2 días</span>
                </div>
                <h3 class="text-sm font-bold text-gray-800 uppercase leading-tight text-left">M-AT-001: Análisis de perfil de aminoácidos</h3>
                <p class="text-[10px] text-gray-400 mt-1 uppercase text-left">Proyecto: Nestlé S.A.</p>
            </div>
            <a href="ejecucion_tecnica.html" class="bg-emerald-100 text-emerald-700 p-3 rounded-2xl hover:bg-emerald-600 hover:text-white transition-all">
                <i class="fas fa-flask text-xl"></i>
            </a>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-gray-300 flex justify-between items-center opacity-60">
            <div class="text-left">
                <div class="flex items-center gap-2 mb-1">
                    <span class="text-[9px] font-black text-gray-400 uppercase bg-gray-50 px-2 py-0.5 rounded text-left">Completada</span>
                </div>
                <h3 class="text-sm font-bold text-gray-400 uppercase leading-tight text-left">P-RE-042: Prueba de Bloom en lote 405</h3>
                <p class="text-[10px] text-gray-400 mt-1 uppercase text-left">Proyecto: Pfizer</p>
            </div>
            <div class="text-emerald-500">
                <i class="fas fa-check-circle text-2xl"></i>
            </div>
        </div>
    </main>
</body>
</html>
